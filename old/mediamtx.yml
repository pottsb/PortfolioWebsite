# Global WebRTC settings
webrtc: yes
webrtcAddress: :8889 # Default WebRTC port
# You might need to configure ICE servers for WebRTC to work across different networks
# webrtcICEServers2:
#  - urls: ["stun:stun.l.google.com:19302"]

# Global RTSP settings (optional, but good to be aware of)
rtsp: yes
rtspAddress: :8554 # Default RTSP listening port (for MediaMTX itself, not the sources)

paths:
  cam1:
    # Source is your first RTSPS stream
    source: rtsp://172.16.1.1:7447/NE66NAdAmvNwCDMK
    # Provide the SHA-256 fingerprint of the first camera's SSL certificate
    # Replace with the actual fingerprint you obtained
    sourceFingerprint: "YOUR_FIRST_CAMERA_CERTIFICATE_SHA256_FINGERPRINT_WITHOUT_COLONS"
    # Optional: force TCP for the source connection if UDP causes issues or if RTSPS requires it
    rtspTransport: tcp
    # Optional: only pull the stream when a client requests it
    sourceOnDemand: yes

  cam2:
    # Source is your second RTSPS stream
    source: rtsp://172.16.1.1:7447/NE66NAdAmvNwCDMK
    # Provide the SHA-256 fingerprint of the second camera's SSL certificate
    # Replace with the actual fingerprint you obtained
    sourceFingerprint: "YOUR_SECOND_CAMERA_CERTIFICATE_SHA256_FINGERPRINT_WITHOUT_COLONS"
    # Optional: force TCP for the source connection
    rtspTransport: tcp
    # Optional: only pull the stream when a client requests it
    sourceOnDemand: yes

# Optional: Logging settings
logLevel: info # Can be debug, info, warn, error
logDestinations: [stdout] # Can also include file, syslog
# logFile: mediamtx.log
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HLS Background Demo</title>

    <!-- hls.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: black;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* Background video */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            filter:  brightness(0.8); /* blur(6px) */
        }

        /* Dark overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        /* Page content */
        .content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .badge {
            margin-top: 20px;
            padding: 8px 14px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(6px);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- Video background -->
    <div class="video-bg">
        <video id="bg-video" autoplay muted playsinline></video>
    </div>

    <div class="overlay"></div>

    <!-- Website content -->
    <div class="content">
        <h1>Live Camera Background</h1>
        <p>This page is using an HLS stream as a full-screen background.</p>
        <div class="badge">/hls/camera1/index.m3u8</div>
    </div>

    <script>

        async function fetchStreamUrls() {
            try {
                const response = await fetch("https://stream.bfrd.uk/api/get-stream", {
                    method: "GET",
                    headers: {
                        "client-id": "mysecurityistopnotch"
                    }
                });
    
                if (!response.ok) {
                    throw new Error("API request failed");
                }
    
                const data = await response.json();
    
                console.log("Updated stream URLs", data);

                return data;

            } catch (err) {
                console.error("Failed to fetch stream URLs:", err);
            }
        }
    
        async function init() {
            const video = document.getElementById('bg-video');
            const streamUrl = await fetchStreamUrls();

            if (Hls.isSupported()) {
                const hls = new Hls({
                    autoStartLoad: true,
                    liveSyncDurationCount: 3,
                    maxBufferLength: 10
                });

                hls.loadSource(streamUrl.cam2);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl.cam2;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(() => {});
                });
            } else {
                document.body.innerHTML = "<h2 style='padding:20px'>HLS not supported in this browser</h2>";
            }
        }
        init();
    </script>

</body>
</html>

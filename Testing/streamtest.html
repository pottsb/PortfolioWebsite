<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual HLS Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center; /* Centers horizontally */
            align-items: center;     /* Centers vertically */
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        .player-container {
            display: flex;
            gap: 40px; /* The gap between the players */
            padding: 20px;
        }

        video {
            width: 480px;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="video1" controls></video>
        <video id="video2" controls></video>
    </div>

    <script> 
        const hlsPlayers = {};
    
        async function fetchStreamUrls() {
            try {
                const response = await fetch("https://stream.bfrd.uk/api/get-stream", {
                    method: "GET",
                    headers: {
                        "client-id": "mysecurityistopnotch"
                    }
                });
    
                if (!response.ok) {
                    throw new Error("API request failed");
                }
    
                const data = await response.json();
    
                console.log("Updated stream URLs", data);
    
                updatePlayer("video1", data.cam1);
                updatePlayer("video2", data.cam2);
    
            } catch (err) {
                console.error("Failed to fetch stream URLs:", err);
            }
        }
    
        function setupPlayer(videoID, url) {
            const video = document.getElementById(videoID);
    
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hlsPlayers[videoID] = hls;
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }
    
        function updatePlayer(videoID, url) {
            const video = document.getElementById(videoID);
    
            if (Hls.isSupported()) {
    
                if (hlsPlayers[videoID]) {
                    hlsPlayers[videoID].loadSource(url);
                    hlsPlayers[videoID].startLoad();
                } else {
                    setupPlayer(videoID, url);
                }
    
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }
    
        fetchStreamUrls();
        setInterval(fetchStreamUrls, 240000);
    </script>

</body>
</html>

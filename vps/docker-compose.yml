
networks:
  wgnet:
    driver: bridge

services:
  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TZ=Europe/London
    volumes:
      - ./wg0.conf:/config/wg_confs/wg0.conf
    ports:
      - "51820:51820/udp"
    networks:
      - wgnet
    restart: unless-stopped

  mediamtx-vps:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx-vps
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    expose:
      - "8888"
    networks:
      - wgnet
    restart: unless-stopped

  api:
    build: ./api
    container_name: stream-api
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    env_file:
      - .env
    environment:
      - NGINX_ENVSUBST_TEMPLATE_DIR=/etc/nginx/templates
      - NGINX_ENVSUBST_TEMPLATE_SUFFIX=.template
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
      - NGINX_ENVSUBST_FILTER=^(STREAM_SECRET|STREAM_DOMAIN)$
    volumes:
      - ./nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
    expose:
      - "80"
    depends_on:
      - mediamtx-vps
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: caddy
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
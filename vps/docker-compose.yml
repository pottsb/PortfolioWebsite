services:
  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TZ=Europe/London
    volumes:
      - ./wireguard:/config
    ports:
      - "51820:51820/udp"
    restart: unless-stopped

  mediamtx-vps:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx-vps
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    ports:
      - "8888:8888"
    restart: unless-stopped

  api:
    build: ./api
    container_name: stream-api
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    env_file:
      - .env
    environment:
      - NGINX_ENVSUBST_TEMPLATE_DIR=/etc/nginx/templates
      - NGINX_ENVSUBST_TEMPLATE_SUFFIX=.template
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
      - NGINX_ENVSUBST_FILTER=^STREAM_SECRET$
    volumes:
      - ./nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      certbot-init:
        condition: service_completed_successfully
      - mediamtx-vps
      - api
    command: >-
      /bin/sh -c '
      test -f /etc/letsencrypt/live/nginx/fullchain.pem &&
      test -f /etc/letsencrypt/live/nginx/privkey.pem &&
      (while :; do sleep 6h; nginx -s reload; done) &
      exec nginx -g "daemon off;"
      '
    restart: unless-stopped

  certbot-init:
    image: certbot/certbot:latest
    container_name: certbot-init
    env_file:
      - .env
    command: >-
      /bin/sh -c '
      test -n "$$LETSENCRYPT_EMAIL" &&
      test -n "$$STREAM_DOMAIN
      certbot certonly
      --standalone
      --preferred-challenges http
      --non-interactive
      --agree-tos
      --email "$$LETSENCRYPT_EMAIL"
      --cert-name nginx
      --keep-until-expiring
      -d "$$STREAM_DOMAIN
      '
    ports:
      - "80:80"
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    restart: "no"

  certbot-renew:
    image: certbot/certbot:latest
    container_name: certbot-renew
    command: >-
      /bin/sh -c '
      while :; do
      certbot renew --webroot -w /var/www/certbot;
      sleep 12h;
      done
      '
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      certbot-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  certbot-etc:
  certbot-www:
services:
  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TZ=Europe/London
    volumes:
      - ./wireguard:/config
    ports:
      - "51820:51820/udp"
    restart: unless-stopped

  mediamtx-vps:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx-vps
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    ports:
      - "8888:8888"
    restart: unless-stopped

  api:
    build: ./api
    container_name: stream-api
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - mediamtx-vps
      - api
    restart: unless-stopped
networks:
  # nginx, api, wireguard (HLS) share this network for Docker DNS.
  app:
    driver: bridge

services:
  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TZ=Europe/London
    volumes:
      - ./wg0.conf:/config/wg_confs/wg0.conf
    ports:
      - "51820:51820/udp"
    expose:
      - "8888"
      - "9997"
      - "9998"
    networks:
      - app
    restart: unless-stopped

  mediamtx-vps:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx-vps
    network_mode: "service:wireguard"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    restart: unless-stopped
    depends_on:
      - wireguard

  api:
    image: pottsb/portfolio-stream-api:latest
    pull_policy: always
    container_name: stream-api
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - app
    restart: unless-stopped

  thumbgen:
    image: pottsb/portfolio-stream-thumbgen:latest
    pull_policy: always
    container_name: thumbgen
    networks:
      - app
    volumes:
      - thumbs_data:/thumbs
    depends_on:
      - wireguard
      - mediamtx-vps
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    env_file:
      - .env
    environment:
      - NGINX_ENVSUBST_TEMPLATE_DIR=/etc/nginx/templates
      - NGINX_ENVSUBST_TEMPLATE_SUFFIX=.template
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
      - NGINX_ENVSUBST_FILTER=^(STREAM_SECRET|STREAM_DOMAIN|API_AUTH_HEADER_SECRET)$
    volumes:
      - ./nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - thumbs_data:/thumbs:ro
    expose:
      - "80"
    networks:
      - app
    depends_on:
      - wireguard
      - mediamtx-vps
      - api
      - thumbgen
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: caddy
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app
    depends_on:
      - nginx
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - app
    depends_on:
      - mediamtx-vps
      - wireguard

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=pickles7667sweet
      - GF_SERVER_ROOT_URL=http://grafana
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - app
    depends_on:
      - prometheus

tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    hostname: mediamtx-monitor
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--hostname=mediamtx-monitor
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - tailscale-data:/var/lib/tailscale
      - ./ts_serve.json:/config/serve.json:ro
    networks:
      - app
    depends_on:
      - grafana

volumes:
  caddy_data:
  caddy_config:
  thumbs_data:
  grafana-data:
  tailscale-data:

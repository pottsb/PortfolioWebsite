logLevel: info

authInternalUsers:
  - user: any
    pass:
    permissions:
      - action: publish
      - action: read
      - action: api
      - action: metrics

hlsAddress: 0.0.0.0:8888
hls: yes

metricsAddress: 0.0.0.0:9998
metrics: yes

apiAddress: 0.0.0.0:9997
api: no

paths:
  camera1:
    source: rtsp://10.0.0.2:8554/camera1
    rtspTransport: tcp
    sourceOnDemand: yes
    maxReaders: 100

  camera2:
    source: rtsp://10.0.0.2:8554/camera2
    rtspTransport: tcp
    sourceOnDemand: yes
    maxReaders: 100
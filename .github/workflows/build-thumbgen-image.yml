name: Build and Push thumbgen image

on:
  push:
    branches:
      - main
    paths:
      - "vps/cctv-relay/thumbgen/**"
      - ".github/workflows/build-thumbgen-image.yml"
  workflow_dispatch:

jobs:
  build-and-push-thumbgen:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (thumbgen)
        id: meta_thumbgen
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-stream-thumbgen
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push thumbgen image
        uses: docker/build-push-action@v6
        with:
          context: ./vps/cctv-relay/thumbgen
          file: ./vps/cctv-relay/thumbgen/Dockerfile
          push: true
          tags: ${{ steps.meta_thumbgen.outputs.tags }}
          labels: ${{ steps.meta_thumbgen.outputs.labels }}
